<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="loader" style="display: none;"></div>
    <header>
        <h1>Notes App</h1>
        <button id="addNoteBtn">+ Add Note</button>
    </header>

    <section>
        <div class="category-filter">
            <button class="filter-button active" data-category="All">All</button>
            <button class="filter-button" data-category="Personal">Personal</button>
            <button class="filter-button" data-category="Work">Work</button>
            <button class="filter-button" data-category="Idea">Idea</button>
            <button class="filter-button" data-category="Journal">Journal</button>
        </div>
    </section>

    <main id="notesContainer">
        
    </main>


    <dialog id="notePopUp" class="pop-up">
        <div class="dialogHeader">
            <h2>Add New Note</h2>
            <button id="closeAddBtn" class="close-add-btn">x</button>
        </div>

        <form class="popUpContent">
            <label for="noteTitle">Title</label>
            <input type="text" id="noteTitle" placeholder="Enter note title..." required>

            <label>Pick a Category</label>
            <div id="categoryBtns">
                <button type="button" class="cat-btn active" data-category="Personal">Personal</button>
                <button type="button" class="cat-btn" data-category="Work">Work</button>
                <button type="button" class="cat-btn" data-category="Journal">Journal</button>
                <button type="button" class="cat-btn" data-category="Idea">Idea</button>
            </div>

            <label for="noteContent">Content</label>
            <textArea id="noteContent" placeholder="Enter your note..." required></textArea>

            <div class="dialog-buttons">
                <button type="button" class="close-add-btn">Cancel</button>
                <input type="submit" value="Add Note" id="submitNoteBtn"></input>
            </div>
        </form>
    </dialog>

    <dialog id="viewNotePopUp" class="pop-up">
        <div class="dialogHeader">
            <h2>View Note</h2>
            <button id="closeViewBtn" class="close-view-btn">x</button>
        </div>

        <form class="popUpContent">
            <label for="noteTitle">Title</label>
            <h3 id="viewNoteTitle"></h3>

            <label>Category</label>
            <p id="viewNoteCategory"></p>

            <label for="noteContent">Content</label>
            <p id="viewNoteContent"></p>

            <div class="dialog-buttons">
                <button type="button" class="close-view-btn">Cancel</button>
                <input type="submit" value="Edit Note" id="edit-button"></input>
            </div>
        </form>
    </dialog>
    

</body>
</html>
