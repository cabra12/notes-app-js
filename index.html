<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Notes App</h1>
        <button id="addNoteBtn">+ Add Note</button>
    </header>

    <main id="notesContainer">

    </main>

    <dialog id="notePopUp">
        <div class="dialogHeader">
            <h2>Add New Note</h2>
            <button id="closeBtn">x</button>
        </div>

        <form class="popUpContent">
            <label for="noteTitle">Title</label>
            <input type="text" id="noteTitle" placeholder="Enter note title..." required>

            <label for="noteContent">Content</label>
            <textArea id="noteContent" placeholder="Enter your note..." required></textArea>
        </form>

        <div class="dialog-buttons">
            <button>Cancel</button>
            <button id="submitNoteBtn">Add Note</button>
        </div>
    </dialog>
</body>
</html>
